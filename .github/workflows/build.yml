name: Build

on:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck Web app
        run: bun run typecheck

      - name: Typecheck CLI
        run: bun run typecheck:cli

      - name: Run unit tests
        run: bun run test

      - name: Run CLI tests
        run: bun run test:cli

      - name: Build Web app
        run: bun run build

      - name: Build CLI
        run: bun run build:cli

      - name: Build Docker image
        run: docker build --tag fsvr:ci .
