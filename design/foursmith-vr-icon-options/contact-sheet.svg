  <rect width="1600" height="1120" fill="#f5f7fb"/>
  <text x="80" y="90" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="38" font-weight="700" fill="#101828">Foursmith VR icon directions</text>
  <text x="80" y="132" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" fill="#667085">Six SVG concepts. No headset, no literal monitor, no padlock-first idea.</text>

  <g transform="translate(80 190)">
    <g filter="url(#shadow)">
      <g clip-path="url(#tile)">
        <rect width="320" height="320" fill="url(#aBg)"/>
        <path d="M74 210c44-112 126-156 205-146-62 26-94 82-112 154-39 4-69 1-93-8Z" fill="#fff" opacity=".2"/>
        <path d="M84 84h72v152h104v64H84V84Z" fill="url(#darkGlass)"/>
        <path d="M155 84c67 18 117 78 128 150-30 10-64 11-100 4-6-61-14-112-28-154Z" fill="#06142d" opacity=".2"/>
        <circle cx="160" cy="160" r="37" fill="#07111f" opacity=".82"/>
        <circle cx="160" cy="160" r="13" fill="#f8fbff"/>
      </g>
    </g>
    <text x="0" y="372" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#101828">01 Focus L</text>
    <text x="0" y="402" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#667085">Brand initial as viewing aperture</text>
  </g>

  <g transform="translate(450 190)">
    <g filter="url(#shadow)">
      <g clip-path="url(#tile)">
        <rect width="320" height="320" fill="url(#bBg)"/>
        <circle cx="160" cy="160" r="112" fill="#061a28" opacity=".28"/>
        <path d="M70 160c50-61 129-86 218-74-33 45-48 91-45 148-74 20-135-5-173-74Z" fill="url(#glass)"/>
        <path d="M84 160c45 48 100 68 164 49" fill="none" stroke="#fff" stroke-opacity=".64" stroke-width="18" stroke-linecap="round"/>
        <circle cx="160" cy="160" r="42" fill="#07111f" opacity=".88"/>
        <circle cx="160" cy="160" r="17" fill="#e9fff7"/>
      </g>
    </g>
    <text x="0" y="372" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#101828">02 Locked Gaze</text>
    <text x="0" y="402" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#667085">Eye/target, but abstract and soft</text>
  </g>

  <g transform="translate(820 190)">
    <g filter="url(#shadow)">
      <g clip-path="url(#tile)">
        <rect width="320" height="320" fill="url(#cBg)"/>
        <path d="M58 216c57-95 135-149 234-161-36 44-55 92-56 146-56-7-112-2-178 15Z" fill="#fff" opacity=".22"/>
        <path d="M84 226c48-65 101-106 158-124" fill="none" stroke="#fff" stroke-width="30" stroke-linecap="round" opacity=".84"/>
        <path d="M88 148c56 8 103 31 142 68" fill="none" stroke="#fff" stroke-width="30" stroke-linecap="round" opacity=".84"/>
        <circle cx="236" cy="98" r="28" fill="#fff" opacity=".92"/>
        <circle cx="236" cy="98" r="11" fill="#5b2cff"/>
      </g>
    </g>
    <text x="0" y="372" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#101828">03 Spatial Fold</text>
    <text x="0" y="402" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#667085">VR content flattened into a clean path</text>
  </g>

  <g transform="translate(80 650)">
    <g filter="url(#shadow)">
      <g clip-path="url(#tile)">
        <rect width="320" height="320" fill="url(#dBg)"/>
        <circle cx="160" cy="160" r="126" fill="#07111f" opacity=".2"/>
        <path d="M70 160c30-53 60-80 90-80s60 27 90 80c-30 53-60 80-90 80s-60-27-90-80Z" fill="none" stroke="#fff" stroke-width="28" stroke-linejoin="round" opacity=".88"/>
        <path d="M110 160h100" stroke="#fff" stroke-width="24" stroke-linecap="round" opacity=".92"/>
        <circle cx="160" cy="160" r="20" fill="#07111f" opacity=".86"/>
      </g>
    </g>
    <text x="0" y="372" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#101828">04 Viewport</text>
    <text x="0" y="402" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#667085">One readable shape at favicon size</text>
  </g>

  <g transform="translate(450 650)">
    <g filter="url(#shadow)">
      <g clip-path="url(#tile)">
        <rect width="320" height="320" fill="url(#eBg)"/>
        <path d="M84 92h72v66h68v70h-68v68H84V92Z" fill="#fff" opacity=".92"/>
        <path d="M160 80c64 25 99 76 105 153-33 15-69 18-109 9V80Z" fill="#fff" opacity=".32"/>
        <path d="M90 236c69 22 127 14 174-24" fill="none" stroke="#fff" stroke-width="20" stroke-linecap="round" opacity=".58"/>
      </g>
    </g>
    <text x="0" y="372" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#101828">05 Lockless L</text>
    <text x="0" y="402" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#667085">Letterform + stabilizing crosshair</text>
  </g>

  <g transform="translate(820 650)">
    <g filter="url(#shadow)">
      <g clip-path="url(#tile)">
        <rect width="320" height="320" fill="url(#fBg)"/>
        <path d="M80 206c37-85 89-128 158-128 18 0 35 3 52 8-34 27-58 71-72 132-47 12-93 8-138-12Z" fill="#fff" opacity=".26"/>
        <path d="M86 94h62v112h92v62H86V94Z" fill="#fff" opacity=".9"/>
        <circle cx="226" cy="110" r="28" fill="#fff" opacity=".9"/>
        <circle cx="226" cy="110" r="11" fill="#1760ff"/>
        <path d="M149 205c34 8 67 8 100 0" stroke="#fff" stroke-opacity=".55" stroke-width="18" stroke-linecap="round"/>
      </g>
    </g>
    <text x="0" y="372" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#101828">06 Look Arc</text>
    <text x="0" y="402" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#667085">Simplest brand mark direction</text>
  </g>
