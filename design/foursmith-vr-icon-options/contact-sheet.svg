<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1120">
  <defs>
    <clipPath id="tile"><rect width="320" height="320" rx="72"/></clipPath>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#07111f" flood-opacity=".22"/>
    </filter>
    <radialGradient id="aBg" cx="30%" cy="18%" r="92%">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset=".38" stop-color="#70d7ff"/>
      <stop offset=".76" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#081225"/>
    </radialGradient>
    <radialGradient id="bBg" cx="50%" cy="18%" r="86%">
      <stop offset="0" stop-color="#e9fff7"/>
      <stop offset=".45" stop-color="#19d3a2"/>
      <stop offset="1" stop-color="#0a2138"/>
    </radialGradient>
    <radialGradient id="cBg" cx="18%" cy="12%" r="100%">
      <stop offset="0" stop-color="#fff6d5"/>
      <stop offset=".35" stop-color="#ff9d4d"/>
      <stop offset=".76" stop-color="#5b2cff"/>
      <stop offset="1" stop-color="#101122"/>
    </radialGradient>
    <radialGradient id="dBg" cx="70%" cy="16%" r="96%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".28" stop-color="#b9ecff"/>
      <stop offset=".7" stop-color="#3347ff"/>
      <stop offset="1" stop-color="#090b1a"/>
    </radialGradient>
    <radialGradient id="eBg" cx="32%" cy="22%" r="90%">
      <stop offset="0" stop-color="#fff4ff"/>
      <stop offset=".42" stop-color="#ff65c8"/>
      <stop offset=".82" stop-color="#5a3cff"/>
      <stop offset="1" stop-color="#0d1024"/>
    </radialGradient>
    <radialGradient id="fBg" cx="30%" cy="14%" r="96%">
      <stop offset="0" stop-color="#f6fffd"/>
      <stop offset=".42" stop-color="#7ee7ff"/>
      <stop offset=".78" stop-color="#1760ff"/>
      <stop offset="1" stop-color="#07111f"/>
    </radialGradient>
    <linearGradient id="glass" x1="70" y1="52" x2="244" y2="270" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff" stop-opacity=".92"/>
      <stop offset=".5" stop-color="#fff" stop-opacity=".28"/>
      <stop offset="1" stop-color="#fff" stop-opacity=".62"/>
    </linearGradient>
    <linearGradient id="darkGlass" x1="80" y1="50" x2="250" y2="270" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff" stop-opacity=".95"/>
      <stop offset=".6" stop-color="#dff8ff" stop-opacity=".36"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".78"/>
